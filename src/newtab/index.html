<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <style>
      /* Blueprint grid: near-black with a faint lavender dot-grid - intentional
         texture instead of a generic gradient. The palette + wordmark sit on top. */
      html,
      body {
        margin: 0;
        height: 100%;
        background-color: #0e0d11;
        /* soft vignette to focus the center + a faint neutral dot-grid */
        background-image:
          radial-gradient(130% 130% at 50% 35%, transparent 58%, rgba(0, 0, 0, 0.45)),
          radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: cover, 24px 24px;
        background-position: center, center;
        background-repeat: no-repeat, repeat;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
